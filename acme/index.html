<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --gray-50: #f8f8f8;
    --gray-100: #f0f0f0;
    --gray-200: #e4e4e4;
    --gray-300: #d0d0d0;
    --gray-400: #a0a0a0;
    --gray-500: #707070;
    --gray-600: #505050;
    --gray-700: #303030;
    --gray-800: #1e1e1e;
    --gray-900: #121212;
    --accent: #0a0a0a;
    --accent-light: #2a2a2a;
    --green: #16a34a;
    --green-light: #dcfce7;
    --red: #dc2626;
    --blue: #1d4ed8;

  html { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--black); }
  body { min-height: 100vh; }
  #root { min-height: 100vh; }

  /* --- BUILDER STYLES --- */
  .builder-layout { display: flex; min-height: 100vh; }
  .builder-sidebar {
    width: 380px; flex-shrink: 0; background: var(--black);
    padding: 32px 28px; overflow-y: auto; color: var(--white);
    position: sticky; top: 0; height: 100vh;
  }
  .builder-main { flex: 1; padding: 40px 48px; overflow-y: auto; }
  .sidebar-logo { margin-bottom: 36px; }
  .sidebar-logo img { height: 36px; filter: brightness(0) invert(1); }
  .sidebar-section { margin-bottom: 28px; }
  .sidebar-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gray-400); margin-bottom: 10px;
  }
  .sidebar-input {
    width: 100%; background: var(--gray-800); border: 1px solid var(--gray-700);
    color: var(--white); font-family: 'Poppins', sans-serif; font-size: 14px;
    padding: 10px 14px; border-radius: 8px; outline: none; transition: border-color 0.2s;
  }
  .sidebar-input:focus { border-color: var(--gray-400); }
  .sidebar-input::placeholder { color: var(--gray-500); }
  .sidebar-textarea {
    width: 100%; background: var(--gray-800); border: 1px solid var(--gray-700);
    color: var(--white); font-family: 'Poppins', sans-serif; font-size: 14px;
    padding: 10px 14px; border-radius: 8px; outline: none; resize: vertical;
    min-height: 80px; transition: border-color 0.2s;
  }
  .sidebar-textarea:focus { border-color: var(--gray-400); }
  .sidebar-textarea::placeholder { color: var(--gray-500); }

  /* Plan selector */
  .plan-card {
    border: 1.5px solid var(--gray-700); border-radius: 10px;
    padding: 14px 16px; cursor: pointer; transition: all 0.2s;
    margin-bottom: 8px;
  }
  .plan-card:hover { border-color: var(--gray-400); }
  .plan-card.selected { border-color: var(--white); background: var(--gray-800); }
  .plan-card-name { font-size: 13px; font-weight: 700; }
  .plan-card-price { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

  /* Addons */
  .addon-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--gray-800);
    font-size: 13px; cursor: pointer; color: var(--gray-300);
  }
  .addon-item:last-child { border-bottom: none; }
  .addon-check {
    width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--gray-600);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .addon-check.checked { background: var(--white); border-color: var(--white); }
  .addon-check.checked::after { content: '✓'; font-size: 11px; color: var(--black); font-weight: 700; }

  .preview-btn {
    width: 100%; background: var(--white); color: var(--black);
    border: none; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700;
    padding: 14px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.02em; margin-top: 8px;
  }
  .preview-btn:hover { background: var(--gray-200); }

  /* Preview pane header */
  .preview-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .preview-title { font-size: 24px; font-weight: 800; }
  .preview-subtitle { font-size: 14px; color: var(--gray-500); margin-top: 2px; }
  .badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .badge-draft { background: var(--gray-200); color: var(--gray-600); }
  .badge-sent { background: #fef3c7; color: #92400e; }
  .badge-accepted { background: var(--green-light); color: var(--green); }

  /* Proposal card (inside builder) */
  .proposal-mini {
    background: var(--white); border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 24px rgba(0,0,0,0.07); border: 1px solid var(--gray-200);
  }
  .proposal-mini-header {
    background: var(--black); padding: 36px 40px; color: var(--white);
  }
  .proposal-mini-body { padding: 36px 40px; }

  /* Line items */
  .line-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--gray-100);
  }
  .line-item:last-child { border-bottom: none; }
  .line-item-name { flex: 1; font-size: 14px; }
  .line-item-type {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--gray-400);
    background: var(--gray-100); padding: 2px 8px; border-radius: 4px;
  }
  .line-item-amount { font-size: 14px; font-weight: 600; min-width: 80px; text-align: right; }

  .divider { border: none; border-top: 1px solid var(--gray-200); margin: 20px 0; }

  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0;
  }
  .total-label { font-size: 13px; color: var(--gray-500); }
  .total-amount { font-size: 13px; font-weight: 600; }
  .grand-total-label { font-size: 16px; font-weight: 800; }
  .grand-total-amount { font-size: 20px; font-weight: 800; }

  /* Section headers */
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--gray-400); margin-bottom: 14px;

  /* Includes grid */
  .includes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .include-item {
    display: flex; align-items: flex-start; gap: 8px;

  .include-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--black); flex-shrink: 0; margin-top: 5px; }

    width: 200px; height: 200px; border-radius: 50%;
    border: 40px solid rgba(255,255,255,0.04);

  .proposal-hero-header::after {

    width: 120px; height: 120px; border-radius: 50%;
    border: 24px solid rgba(255,255,255,0.06);

  .proposal-tag {

    letter-spacing: 0.15em; text-transform: uppercase;
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7);

  .proposal-client-name { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 6px; font-weight: 500; }
  .proposal-heading { font-size: 36px; font-weight: 800; line-height: 1.15; margin-bottom: 12px; }
  .proposal-date { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 16px; }

  .plan-highlight-name { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
  .plan-highlight-title { font-size: 22px; font-weight: 800; }
  .plan-highlight-desc { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .plan-highlight-badge {
    background: var(--white); color: var(--black); font-size: 20px; font-weight: 900;
    padding: 14px 24px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;

  .summary-card {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: 14px; overflow: hidden; margin-bottom: 24px;
  }
  .summary-card-header {
    padding: 16px 24px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200);

  .summary-card-body { padding: 8px 24px 16px; }
  .summary-line {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--gray-100); font-size: 14px;
  }
  .summary-line:last-child { border-bottom: none; }
  .summary-line-name { color: var(--gray-700); }
  .summary-line-type {
    font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--gray-400); background: var(--gray-100); padding: 2px 7px; border-radius: 4px;
    margin-left: 8px;

  .summary-line-amount { font-weight: 600; }

  .totals-block {
    background: var(--white); border: 1px solid var(--gray-200); border-radius: 14px;

  .totals-row {

  .totals-row.grand .totals-amount { font-size: 22px; font-weight: 900; }
  .totals-label { color: var(--gray-600); }
  .totals-amount { font-weight: 600; }

  .includes-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .client-include-item {

  .client-include-icon { font-size: 15px; flex-shrink: 0; }

    background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 12px;
    padding: 18px 22px; display: flex; align-items: center; gap: 16px;

  .commitment-icon { font-size: 20px; }

  /* Signature section */

    background: var(--white); border: 1.5px solid var(--gray-200); border-radius: 16px;

  .sig-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .sig-subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 28px; line-height: 1.6; }
  .sig-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .sig-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 6px; }
  .sig-input {
    width: 100%; border: 1.5px solid var(--gray-200); border-radius: 8px;

  .sig-canvas-wrap { position: relative; margin-bottom: 16px; }
  .sig-canvas-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 8px; }
  canvas.sig-canvas {
    width: 100%; height: 140px; border: 1.5px dashed var(--gray-300); border-radius: 10px;
    background: var(--gray-50); cursor: crosshair; display: block; touch-action: none;
  }
  canvas.sig-canvas.signed { border-color: var(--black); border-style: solid; background: var(--white); }
  .sig-clear-btn {
    position: absolute; top: 32px; right: 10px; background: none; border: none;
    font-size: 11px; color: var(--gray-400); cursor: pointer; padding: 4px 8px;
    font-family: 'Poppins', sans-serif;
  }
  .sig-clear-btn:hover { color: var(--black); }
  .sig-checkbox-wrap {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 24px;
    font-size: 13px; color: var(--gray-600); line-height: 1.6; cursor: pointer;
  }
  .sig-checkbox { width: 18px; height: 18px; border: 1.5px solid var(--gray-300); border-radius: 4px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .sig-checkbox.checked { background: var(--black); border-color: var(--black); }
  .sig-checkbox.checked::after { content: '✓'; font-size: 11px; color: var(--white); font-weight: 700; }
  .accept-btn {
    width: 100%; background: var(--black); color: var(--white);
    border: none; font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700;
    padding: 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .accept-btn:hover:not(:disabled) { background: var(--gray-800); }
  .accept-btn:disabled { background: var(--gray-300); cursor: not-allowed; color: var(--gray-500); }

  /* Accepted state */
  .accepted-banner {
    background: var(--green-light); border: 1.5px solid #bbf7d0; border-radius: 16px;
    padding: 32px 36px; text-align: center; margin-top: 8px;
  }
  .accepted-icon { font-size: 40px; margin-bottom: 12px; }
  .accepted-title { font-size: 22px; font-weight: 800; color: var(--green); margin-bottom: 6px; }
  .accepted-sub { font-size: 14px; color: #166534; }

  /* Mode toggle */
  .mode-toggle {
    display: flex; gap: 4px; background: var(--gray-100); padding: 4px; border-radius: 10px;
  }
  .mode-btn {
    padding: 8px 20px; border: none; border-radius: 7px; font-family: 'Poppins', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    background: transparent; color: var(--gray-500);
  }
  .mode-btn.active { background: var(--white); color: var(--black); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

  /* Responsive */
  @media (max-width: 900px) {
    .builder-layout { flex-direction: column; }
    .builder-sidebar { width: 100%; height: auto; position: static; }
    .builder-main { padding: 24px 20px; }
    .proposal-hero-header { padding: 36px 28px; }
    .proposal-body { padding: 32px 28px; }
    .plan-highlight { flex-direction: column; gap: 16px; }
    .sig-fields { grid-template-columns: 1fr; }
    .includes-list { grid-template-columns: 1fr; }
    .includes-grid { grid-template-columns: 1fr; }
    .client-header { padding: 0 24px; }
    .client-body { padding: 32px 16px 60px; }
    .signature-section { padding: 28px 24px; }
  }
</style>

function SignaturePad({ onSign, onClear }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const hasSig = useRef(false);

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return [(e.touches[0].clientX - rect.left) * scaleX, (e.touches[0].clientY - rect.top) * scaleY];
    }
    return [(e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY];
  }

  function start(e) {
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    drawing.current = true;
    const [x, y] = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(x, y);
    canvas.classList.add('signed');
  }
  function move(e) {
    if (!drawing.current) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#0a0a0a';
    const [x, y] = getPos(e, canvas);
    ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
    hasSig.current = true;
    onSign && onSign(true);
  }
  function end(e) { drawing.current = false; }

  useEffect(() => {
    const canvas = canvasRef.current;
    canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    const ctx = canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }, []);

  function clear() {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.classList.remove('signed');
    hasSig.current = false;
    onSign && onSign(false);
    onClear && onClear();
  }

  return (
    <div className="sig-canvas-wrap">
      <div className="sig-canvas-label">Your Signature</div>
      <canvas
        ref={canvasRef}
        className="sig-canvas"
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}
      />
      <button className="sig-clear-btn" onClick={clear}>Clear</button>
    </div>
  );
}

// ──────────────────────────────────────────────
// CLIENT VIEW
// ──────────────────────────────────────────────
function ClientView({ data, onBack }) {
  const plan = PLANS[data.planId];
  const [sigName, setSigName] = useState('');
  const [sigTitle, setSigTitle] = useState('');
  const [sigDate, setSigDate] = useState(formatDate());
  const [hasSig, setHasSig] = useState(false);
  const [agreed, setAgreed] = useState(false);
  const [accepted, setAccepted] = useState(false);
  const [sigKey, setSigKey] = useState(0);

  const selectedAddons = data.addons || [];
  const canAccept = sigName.trim() && hasSig && agreed;

  function handleAccept() {
    if (!canAccept) return;
    setAccepted(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  const upfront = (plan.setup || 0) + (plan.hosting || 0);
  const monthly = plan.monthly || 0;

  return (
    <div className="client-view">
      <div className="client-header">
        <img src={`data:image/jpeg;base64,${LOGO_B64}`} alt="S2 Works" />
        {accepted
          ? <span className="badge badge-accepted">✓ Accepted</span>
          : <span className="badge badge-sent">Awaiting Acceptance</span>
        }
      </div>

      <div className="client-body">
        {/* Hero */}
        <div className="proposal-hero">
          <div className="proposal-hero-header">
            <div className="proposal-tag">Web Design Proposal</div>
            <div className="proposal-client-name">Prepared for {data.clientName || 'Client'}</div>
            <div className="proposal-heading">{data.proposalTitle || `${plan.name} — Website Package`}</div>
            {data.company && <div style={{ fontSize: 15, color: 'rgba(255,255,255,0.55)', marginTop: 6 }}>{data.company}</div>}
            <div className="proposal-date">Issued {formatDate()}</div>
          </div>

          <div className="proposal-body">
            {/* Note */}
            {data.note && (
              <div className="proposal-note">
                <p>{data.note}</p>
              </div>
            )}

            {/* Plan highlight */}
            <div style={{ marginBottom: 8 }}>
              <div className="section-title" style={{ marginBottom: 12 }}>Selected Plan</div>
            </div>
            <div className="plan-highlight">
              <div>
                <div className="plan-highlight-name">Plan</div>
                <div className="plan-highlight-title">{plan.name}</div>
                <div className="plan-highlight-desc">{plan.description}</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                {upfront > 0 && <div className="plan-highlight-badge">{fmtMoney(upfront)} <span style={{ fontSize: 12, fontWeight: 500 }}>upfront</span></div>}
                {monthly > 0 && <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: 13, marginTop: 8 }}>{fmtMoney(monthly)}/mo</div>}
              </div>
            </div>

            {/* What's included */}
            <div className="includes-section">
              <div className="section-title">What's Included</div>
              <div className="includes-list">
                {plan.includes.map((item, i) => (
                  <div key={i} className="client-include-item">
                    <span className="client-include-icon">✓</span>
                    <span>{item}</span>
                  </div>
                ))}
                {selectedAddons.map(addonId => {
                  const a = ADDONS.find(x => x.id === addonId);
                  return a ? (
                    <div key={addonId} className="client-include-item" style={{ borderLeft: '3px solid #0a0a0a' }}>
                      <span className="client-include-icon">{ADDON_ICONS[addonId] || '➕'}</span>
                      <span>{a.label}</span>
                    </div>
                  ) : null;
                })}
              </div>
            </div>

            {/* Pricing breakdown */}
            <div className="section-title">Investment Summary</div>
            <div className="summary-card">
              <div className="summary-card-header">One-Time Costs</div>
              <div className="summary-card-body">
                {plan.setup > 0 && (
                  <div className="summary-line">
                    <span className="summary-line-name">Setup & Build Fee <span className="summary-line-type">one-time</span></span>
                    <span className="summary-line-amount">{fmtMoney(plan.setup)}</span>
                  </div>
                )}
                {plan.hosting > 0 && (
                  <div className="summary-line">
                    <span className="summary-line-name">Annual Hosting & Security <span className="summary-line-type">yearly</span></span>
                    <span className="summary-line-amount">{fmtMoney(plan.hosting)}</span>
                  </div>
                )}
                {data.domainFee && (
                  <div className="summary-line">
                    <span className="summary-line-name">Domain Registration <span className="summary-line-type">yearly</span></span>
                    <span className="summary-line-amount">{data.domainFee === 'waived' ? <span style={{ color: 'var(--green)', fontWeight: 700 }}>Waived</span> : fmtMoney(data.domainFee)}</span>
                  </div>
                )}
                {selectedAddons.map(addonId => {
                  const a = ADDONS.find(x => x.id === addonId);
                  return a ? (
                    <div key={addonId} className="summary-line">
                      <span className="summary-line-name">{a.label} <span className="summary-line-type">add-on</span></span>
                      <span className="summary-line-amount">{a.price ? fmtMoney(a.price) : 'TBD'}</span>
                    </div>
                  ) : null;
                })}
              </div>
            </div>

            {monthly > 0 && (
              <div className="summary-card">
                <div className="summary-card-header">Recurring</div>
                <div className="summary-card-body">
                  <div className="summary-line">
                    <span className="summary-line-name">Monthly Retainer <span className="summary-line-type">monthly</span></span>
                    <span className="summary-line-amount">{fmtMoney(monthly)}/mo</span>
                  </div>
                  {plan.hours > 0 && (
                    <div className="summary-line">
                      <span className="summary-line-name">Included modification hours <span className="summary-line-type">per month</span></span>
                      <span className="summary-line-amount">{plan.hours}h</span>
                    </div>
                  )}
                </div>
              </div>
            )}

            <div className="totals-block">
              {upfront > 0 && (
                <div className="totals-row">
                  <span className="totals-label">Total Upfront</span>
                  <span className="totals-amount">{fmtMoney(upfront)}{data.domainFee && data.domainFee !== 'waived' ? ' + domain' : ''}</span>
                </div>
              )}
              {monthly > 0 && (
                <div className="totals-row">
                  <span className="totals-label">Monthly</span>
                  <span className="totals-amount">{fmtMoney(monthly)}/mo</span>
                </div>
              )}
              <div className="totals-row grand">
                <span className="totals-label grand-total-label">To Get Started</span>
                <span className="totals-amount grand-total-amount">{fmtMoney(upfront > 0 ? upfront : monthly)}</span>
              </div>
            </div>

            {/* Commitment */}
            <div className="commitment-bar">
              <span className="commitment-icon">📋</span>
              <span><strong>Commitment:</strong> {plan.commitment} — {plan.id === 'baseline' ? 'No ongoing commitment required.' : `Billed ${plan.commitment.toLowerCase()}, cancel with notice.`}</span>
            </div>

            {/* Plan note */}
            <div className="commitment-bar" style={{ background: '#fff8e1', borderColor: '#fde68a' }}>
              <span className="commitment-icon">ℹ️</span>
              <span>{plan.note}</span>
            </div>

            {/* Signature */}
            {!accepted ? (
              <div className="signature-section">
                <div className="sig-title">Accept this Proposal</div>
                <div className="sig-subtitle">
                  By signing below, you confirm your acceptance of this proposal and authorize S2 Works to proceed with the project as outlined above.
                </div>
                <div className="sig-fields">
                  <div className="sig-field">
                    <label>Full Name</label>
                    <input className="sig-input" value={sigName} onChange={e => setSigName(e.target.value)} placeholder="Your full name" />
                  </div>
                  <div className="sig-field">
                    <label>Title / Position</label>
                    <input className="sig-input" value={sigTitle} onChange={e => setSigTitle(e.target.value)} placeholder="e.g. Owner" />
                  </div>
                  <div className="sig-field">
                    <label>Date</label>
                    <input className="sig-input" value={sigDate} readOnly style={{ color: 'var(--gray-500)' }} />
                  </div>
                </div>
                <SignaturePad key={sigKey} onSign={setHasSig} onClear={() => setSigKey(k => k + 1)} />
                <div className="sig-checkbox-wrap" onClick={() => setAgreed(a => !a)}>
                  <div className={`sig-checkbox ${agreed ? 'checked' : ''}`} />
                  <span>I agree to the terms outlined in this proposal and authorize S2 Works to begin the project. I understand the pricing, deliverables, and commitment as described.</span>
                </div>
                <button className="accept-btn" disabled={!canAccept} onClick={handleAccept}>
                  {canAccept ? 'Accept & Sign Proposal' : 'Complete all fields to accept'}
                </button>
              </div>
            ) : (
              <div className="accepted-banner">
                <div className="accepted-icon">🎉</div>
                <div className="accepted-title">Proposal Accepted!</div>
                <div className="accepted-sub">
                  Thank you, <strong>{sigName}</strong>! S2 Works will be in touch shortly to get things started.
                </div>
                <div style={{ marginTop: 16, fontSize: 12, color: '#166534', opacity: 0.7 }}>
                  Signed on {sigDate}{sigTitle ? ` · ${sigTitle}` : ''}
                </div>
              </div>
            )}
          </div>
        </div>

        {onBack && (
          <div style={{ textAlign: 'center', marginTop: 20 }}>
            <button onClick={onBack} style={{ background: 'none', border: 'none', color: 'var(--gray-400)', cursor: 'pointer', fontFamily: 'Poppins', fontSize: 13 }}>← Back to Builder</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────
// MINI PROPOSAL PREVIEW (builder right pane)
// ──────────────────────────────────────────────
function MiniPreview({ data }) {
  const plan = PLANS[data.planId];
  const selectedAddons = data.addons || [];
  const upfront = (plan.setup || 0) + (plan.hosting || 0);
  const monthly = plan.monthly || 0;

  return (
    <div className="proposal-mini">
      <div className="proposal-mini-header">
        <div style={{ opacity: 0.5, fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', marginBottom: 10 }}>Proposal Preview</div>
        <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>{data.proposalTitle || `${plan.name} — Website Package`}</div>
        <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.55)' }}>
          {data.clientName ? `Prepared for ${data.clientName}` : 'Client TBD'}
          {data.company ? ` · ${data.company}` : ''}
        </div>
        <div style={{ marginTop: 10, fontSize: 11, color: 'rgba(255,255,255,0.35)' }}>{formatDate()}</div>
      </div>
      <div className="proposal-mini-body">
        {/* Plan */}
        <div className="section-title" style={{ marginBottom: 12 }}>Plan</div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'var(--gray-50)', borderRadius: 10, padding: '14px 16px', marginBottom: 20 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 15 }}>{plan.name}</div>
            <div style={{ fontSize: 12, color: 'var(--gray-500)', marginTop: 2 }}>{plan.includes.length} items included</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            {upfront > 0 && <div style={{ fontWeight: 800, fontSize: 16 }}>{fmtMoney(upfront)}</div>}
            {monthly > 0 && <div style={{ fontSize: 12, color: 'var(--gray-500)' }}>{fmtMoney(monthly)}/mo</div>}
          </div>
        </div>

        {/* Line items */}
        <div className="section-title">Includes</div>
        {plan.includes.slice(0, 5).map((item, i) => (
          <div key={i} className="line-item">
            <div className="line-item-name">{item}</div>
            <div className="line-item-type">included</div>
          </div>
        ))}
        {plan.includes.length > 5 && (
          <div style={{ fontSize: 12, color: 'var(--gray-400)', padding: '8px 0' }}>+{plan.includes.length - 5} more items…</div>
        )}
        {selectedAddons.map(addonId => {
          const a = ADDONS.find(x => x.id === addonId);
          return a ? (
            <div key={addonId} className="line-item">
              <div className="line-item-name">{a.label}</div>
              <div className="line-item-type">add-on</div>
            </div>
          ) : null;
        })}

        <hr className="divider" />

        {/* Totals */}
        {upfront > 0 && (
          <div className="total-row">
            <div className="total-label">Upfront Total</div>
            <div className="total-amount">{fmtMoney(upfront)}</div>
          </div>
        )}
        {monthly > 0 && (
          <div className="total-row">
            <div className="total-label">Monthly</div>
            <div className="total-amount">{fmtMoney(monthly)}/mo</div>
          </div>
        )}
        <div className="total-row" style={{ marginTop: 8, paddingTop: 12, borderTop: '2px solid var(--black)' }}>
          <div className="grand-total-label">To Get Started</div>
          <div className="grand-total-amount">{fmtMoney(upfront > 0 ? upfront : monthly)}</div>
        </div>

        {data.note && (
          <div style={{ marginTop: 20, fontSize: 13, color: 'var(--gray-500)', borderTop: '1px solid var(--gray-100)', paddingTop: 14, lineHeight: 1.6 }}>
            <em>"{data.note}"</em>
          </div>
        )}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────
// BUILDER (sidebar + right pane)
// ──────────────────────────────────────────────
function Builder({ onPreview }) {
  const [data, setData] = useState({
    clientName: '',
    company: '',
    email: '',
    proposalTitle: '',
    note: '',
    planId: 'starter',
    addons: [],
    domainFee: '',
  });

  function set(key, val) {
    setData(d => ({ ...d, [key]: val }));
  }
  function toggleAddon(id) {
    setData(d => ({
      ...d,
      addons: d.addons.includes(id) ? d.addons.filter(a => a !== id) : [...d.addons, id]
    }));
  }

  const plan = PLANS[data.planId];

  return (
    <div className="builder-layout">
      {/* SIDEBAR */}
      <div className="builder-sidebar">
        <div className="sidebar-logo">
          <img src={`data:image/jpeg;base64,${LOGO_B64}`} alt="S2 Works" />
        </div>

        <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 4 }}>Proposal Builder</div>
        <div style={{ fontSize: 12, color: 'var(--gray-500)', marginBottom: 28 }}>Configure and send to your client.</div>

        {/* Client Info */}
        <div className="sidebar-section">
          <div className="sidebar-label">Client Information</div>
          <input className="sidebar-input" style={{ marginBottom: 8 }} placeholder="Client name" value={data.clientName} onChange={e => set('clientName', e.target.value)} />
          <input className="sidebar-input" style={{ marginBottom: 8 }} placeholder="Company name" value={data.company} onChange={e => set('company', e.target.value)} />
          <input className="sidebar-input" placeholder="Client email" value={data.email} onChange={e => set('email', e.target.value)} />
        </div>

        {/* Proposal title */}
        <div className="sidebar-section">
          <div className="sidebar-label">Proposal Title <span style={{ color: 'var(--gray-600)', textTransform: 'none', fontWeight: 400, letterSpacing: 0 }}>(optional)</span></div>
          <input className="sidebar-input" placeholder={`${plan.name} — Website Package`} value={data.proposalTitle} onChange={e => set('proposalTitle', e.target.value)} />
        </div>

        {/* Plan selector */}
        <div className="sidebar-section">
          <div className="sidebar-label">Plan</div>
          {Object.values(PLANS).map(p => (
            <div key={p.id} className={`plan-card ${data.planId === p.id ? 'selected' : ''}`} onClick={() => set('planId', p.id)}>
              <div className="plan-card-name">{p.name}</div>
              <div className="plan-card-price">
                {p.setup > 0 ? `$${p.setup} setup` : ''}
                {p.monthly > 0 ? `${p.setup > 0 ? ' · ' : ''}$${p.monthly}/mo` : ''}
              </div>
            </div>
          ))}
        </div>

        {/* Add-ons */}
        <div className="sidebar-section">
          <div className="sidebar-label">Add-ons</div>
          {ADDONS.map(a => (
            <div key={a.id} className="addon-item" onClick={() => toggleAddon(a.id)}>
              <div className={`addon-check ${data.addons.includes(a.id) ? 'checked' : ''}`} />
              <span>{a.label}</span>
              <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--gray-500)' }}>{a.note}</span>
            </div>
          ))}
        </div>

        {/* Domain fee */}
        <div className="sidebar-section">
          <div className="sidebar-label">Domain Fee <span style={{ color: 'var(--gray-600)', textTransform: 'none', fontWeight: 400, letterSpacing: 0 }}>(type "waived" or amount)</span></div>
          <input className="sidebar-input" placeholder='e.g. 20 or "waived"' value={data.domainFee} onChange={e => set('domainFee', e.target.value)} />
        </div>

        {/* Personal note */}
        <div className="sidebar-section">
          <div className="sidebar-label">Personal Note to Client</div>
          <textarea className="sidebar-textarea" placeholder="Add a warm intro or project-specific message…" value={data.note} onChange={e => set('note', e.target.value)} />
        </div>

        <button className="preview-btn" onClick={() => onPreview(data)}>
          Preview Client View →
        </button>

        <div style={{ marginTop: 12, fontSize: 11, color: 'var(--gray-600)', textAlign: 'center' }}>
          The client view includes an e-signature form
        </div>
      </div>

      {/* RIGHT PANE */}
      <div className="builder-main">
        <div className="preview-header">
          <div>
            <div className="preview-title">Live Preview</div>
            <div className="preview-subtitle">This updates as you fill in the sidebar.</div>
          </div>
          <span className="badge badge-draft">Draft</span>
        </div>
        <MiniPreview data={data} />
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────
// ROOT APP
// ──────────────────────────────────────────────
function App() {
  const [mode, setMode] = useState('builder'); // 'builder' | 'client'
  const [proposalData, setProposalData] = useState(null);

  function handlePreview(data) {
    setProposalData(data);
    setMode('client');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  return mode === 'builder'
    ? <Builder onPreview={handlePreview} />
    : <ClientView data={proposalData} onBack={() => setMode('builder')} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
